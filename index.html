<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位展覽館</title>
    <style>
        :root { 
            --maroon: #8b203c; 
            --pink: #d68197; 
            --light-pink: #fdf5f7;
        }
        body { 
            margin: 0; 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f5f5f5; 
            min-height: 100vh;
        }

        /* ---------------- 頁面切換控制 ---------------- */
        .page { display: none; }
        .page.active { display: block; }

        /* ---------------- 載入動畫 (Spinner) ---------------- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(139, 32, 60, 0.95); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; font-size: 24px; transition: opacity 0.5s;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3); width: 50px; height: 50px;
            border-radius: 50%; border-left-color: white;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ---------------- 1. 首頁樣式 ---------------- */
        header { 
            background: var(--maroon); 
            height: 200px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 40px; font-weight: bold; letter-spacing: 5px;
        }
        .home-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; 
            padding: 50px; max-width: 1000px; margin: 20px auto;
        }
        .theme-btn {
            background-color: var(--pink); color: white; height: 150px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; border-radius: 25px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-weight: bold;
        }
        .theme-btn:hover { transform: scale(1.05); background-color: #c46d84; }

        /* 清除快取重整按鈕 */
        .reload-cache-btn {
            display: block; margin: 20px auto; background: #666; color: white;
            border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;
        }

        /* ---------------- 2. 列表頁樣式 ---------------- */
        .header-bar {
            background: var(--maroon); color: white; padding: 20px; 
            display: flex; align-items: center; justify-content: center; position: relative; min-height: 40px;
        }
        .header-title { font-size: 32px; font-weight: bold; margin: 0; }
        .nav-btn {
            position: absolute; left: 20px; background-color: var(--pink); color: white;
            border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .list-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 40px; max-width: 1200px; margin: 0 auto;
        }
        .item-card {
            background-color: var(--pink); border-radius: 20px; padding: 15px;
            text-align: center; color: white; cursor: pointer; transition: 0.3s; text-decoration: none;
        }
        .item-card:hover { background-color: #c46d84; transform: translateY(-5px); }
        .img-placeholder {
            background: #fff; width: 100%; aspect-ratio: 1/1; border-radius: 15px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .img-placeholder img { width: 100%; height: 100%; object-fit: contain; }

        /* ---------------- 3. 詳細頁樣式 ---------------- */
        .detail-container { 
            display: flex; width: 90%; max-width: 1100px; gap: 40px; background: white;
            padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 40px auto; align-items: stretch; 
        }
        .main-image-box {
            flex: 1.2; background-color: var(--pink); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; min-height: 450px; padding: 20px; box-sizing: border-box; text-align: center;
        }
        .main-image-box img { max-width: 100%; max-height: 350px; border-radius: 15px; object-fit: contain; }
        .medal-title { font-size: 28px; font-weight: bold; margin-top: 20px; }
        .content-sidebar { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .info-card {
            background-color: var(--light-pink); border-left: 5px solid var(--maroon);
            padding: 20px; border-radius: 0 15px 15px 0; flex-grow: 1; display: flex; flex-direction: column; gap: 15px;
        }
        .info-section h3 { margin: 0; color: var(--maroon); font-size: 18px; border-bottom: 1px dashed var(--pink); padding-bottom: 5px; }
        .info-section p { margin: 5px 0 0 0; color: #444; font-size: 15px; line-height: 1.6; white-space: pre-line; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn {
            background-color: var(--maroon); color: white; border: none; padding: 15px; 
            border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .action-btn:hover { background-color: #b03554; }
        .action-btn.active { background-color: var(--pink); }
        .back-btn { background: #666; }

        @media (max-width: 768px) {
            .home-grid { grid-template-columns: 1fr; padding: 20px; }
            .list-grid { grid-template-columns: repeat(2, 1fr); padding: 20px; }
            .detail-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="loader" style="display: none;">
        <div class="spinner"></div>
        <div id="loader-text">首次進入，正在從雲端載入展館資料...</div>
    </div>

    <div id="page-home" class="page active">
        <header>數 位 展 覽 館</header>
        <div class="home-grid">
            <div class="theme-btn" onclick="switchToList('物件')">主題：物件</div>
            <div class="theme-btn" onclick="switchToList('配件')">主題：配件</div>
            <div class="theme-btn" onclick="switchToList('技能')">主題：技能</div>
            <div class="theme-btn" onclick="switchToList('特質')">主題：特質</div>
        </div>
    </div>

    <div id="page-list" class="page">
        <div class="header-bar">
            <button class="nav-btn" onclick="switchToHome()">🏠 回首頁</button>
            <div class="header-title" id="list-title">主題</div>
        </div>
        <div class="list-grid" id="list-container"></div>
    </div>

    <div id="page-detail" class="page">
        <div class="header-bar">
            <button class="nav-btn" onclick="backToList()">⬅ 回列表</button>
            <div class="header-title">作品詳情</div>
        </div>
        <div class="detail-container">
            <div class="main-image-box">
                <img id="medal-img" src="" alt="獎牌圖片">
                <div class="medal-title" id="medal-name">作品名稱</div>
            </div>
            <div class="content-sidebar">
                <div class="info-card">
                    <div class="info-section">
                        <h3>💡 作品理念</h3>
                        <p id="concept-text">載入中...</p>
                    </div>
                    <div class="info-section">
                        <h3>🎤 採訪內容</h3>
                        <p id="interview-text">載入中...</p>
                    </div>
                </div>
                <div class="button-group">
                    <button class="action-btn" id="draft-btn" onclick="toggleDraft()">切換草圖設計</button>
                    <button class="action-btn back-btn" onclick="backToList()">回列表頁</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 填入你的 Apps Script 網址 (記得使用一次打包所有資料的 GAS 版本)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzFdiVTqT5QxCJPdCRLDHGn_tKrpIJ82LlmRKLYkrFRxCxSu1n9lnwXA_bOtTOYzRe7Fg/exec"; 

        let exhibitionData = null; // 存放全站資料
        let currentCategory = "";  // 記錄目前在看哪個分類
        let currentMedal = null;   // 記錄目前在看哪面獎牌
        let showingDraft = false;

        // ─── 核心功能：首次載入與快取判斷 ───
        async function initData() {
            const cachedData = localStorage.getItem('exhibitionData');
            
            if (cachedData) {
                // 第二次以後進來：直接讀取快取，0.01 秒完成
                exhibitionData = JSON.parse(cachedData);
                console.log("⚡ 成功讀取本地快取資料，不驚動 Google API！");
            } else {
                // 第一次進來：顯示載入畫面，去 Google 撈資料
                await fetchFromGoogle();
            }
        }

        // 實際向 Google 請求資料
        async function fetchFromGoogle() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            document.getElementById('loader-text').innerText = "首次進入，正在從雲端載入展館資料...";

            try {
                const response = await fetch(GAS_URL);
                exhibitionData = await response.json();
                
                // 存入快取
                localStorage.setItem('exhibitionData', JSON.stringify(exhibitionData));
                console.log("☁ 首次進入：已從 Google 雲端同步並存入快取！");

                // 隱藏載入畫面
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            } catch (e) {
                document.getElementById('loader-text').innerText = "載入失敗，請確認你的網路、GAS網址及權限！";
                console.error("載入出錯:", e);
            }
        }

        // 提供手動強制更新的按鈕功能（當你在試算表改了文字、雲端改了圖片，點這個可以一鍵同步）
        function forceReloadData() {
            localStorage.removeItem('exhibitionData');
            fetchFromGoogle();
        }


        // ─── 路由切換控制 (SPA 頁面切換) ───
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        // 回首頁
        function switchToHome() {
            showPage('page-home');
        }

        // 首頁點擊分類 $\rightarrow$ 進列表頁
        function switchToList(category) {
            currentCategory = category;
            document.getElementById('list-title').innerText = "主題：" + category;
            
            const container = document.getElementById('list-container');
            container.innerHTML = "";

            if (!exhibitionData) {
                container.innerHTML = "<div style='grid-column:1/-1; text-align:center;'>尚未取得資料，請回首頁重試。</div>";
                showPage('page-list');
                return;
            }

            // 篩選對應分類的圖片
            const filteredImages = exhibitionData.images.filter(img => img.category === category);

            if (filteredImages.length === 0) {
                container.innerHTML = "<div style='grid-column:1/-1; text-align:center;'>此分類目前沒有獎牌照片喔！</div>";
            } else {
                filteredImages.forEach(item => {
                    container.innerHTML += `
                        <div class="item-card" onclick="switchToDetail('${item.name}', '${item.url}')">
                            <div class="img-placeholder">
                                <img src="${item.url}" alt="${item.name}">
                            </div>
                            <div style="font-weight: bold; font-size: 18px;">${item.name}</div>
                        </div>
                    `;
                });
            }
            showPage('page-list');
        }

        // 列表頁點擊卡片 $\rightarrow$ 進詳細頁
        function switchToDetail(name, imgUrl) {
            currentMedal = { name: name, url: imgUrl };
            showingDraft = false;

            document.getElementById('medal-name').innerText = name;
            document.getElementById('medal-img').src = imgUrl;

            // 重設草圖按鈕狀態
            const draftBtn = document.getElementById('draft-btn');
            draftBtn.innerText = "切換草圖設計";
            draftBtn.classList.remove('active');

            // 預設查無資料
            let detailText = { concept: "暫無作品理念資訊。", interview: "暫無採訪內容資訊。", draftUrl: "" };

            // 從快取資料中比對文字
            if (exhibitionData && exhibitionData.texts && exhibitionData.texts[name]) {
                detailText = exhibitionData.texts[name];
            }

            // 把對應文字塞到畫面上
            document.getElementById('concept-text').innerText = detailText.concept;
            document.getElementById('interview-text').innerText = detailText.interview;
            
            // 暫存目前的草圖連結
            currentMedal.draftUrl = detailText.draftUrl;

            showPage('page-detail');
        }

        // 從詳細頁退回列表頁
        function backToList() {
            switchToList(currentCategory);
        }

        // ─── 詳細頁功能 ───
        function toggleDraft() {
            const imgElement = document.getElementById('medal-img');
            const draftBtn = document.getElementById('draft-btn');

            if (!showingDraft) {
                if (currentMedal.draftUrl) {
                    imgElement.src = currentMedal.draftUrl;
                    draftBtn.innerText = "看成品設計";
                    draftBtn.classList.add('active');
                    showingDraft = true;
                } else {
                    alert("此獎牌尚未在試算表中填寫草圖設計ID！");
                }
            } else {
                imgElement.src = currentMedal.url;
                draftBtn.innerText = "切換草圖設計";
                draftBtn.classList.remove('active');
                showingDraft = false;
            }
        }

        // 啟動初始化程序
        initData();
    </script>
</body>
</html>
