<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展覽首頁</title>
    <style>
        :root { --maroon: #8b203c; --pink: #d68197; }
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; background-color: #f5f5f5; }
        header { 
            background: var(--maroon) url('./header.png') center/cover; 
            height: 200px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 40px; font-weight: bold; letter-spacing: 5px;
        }
        .container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; 
            padding: 50px auto; max-width: 1000px; margin: 60px auto;
        }
        .theme-btn {
            background-color: var(--pink); color: white; text-decoration: none;
            height: 150px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; border-radius: 25px; transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .theme-btn:hover { transform: scale(1.05); background-color: #c46d84; }
    </style>
</head>
<body>
    <header>展 覽 標 題</header>
    <div class="container">
        <a href="list.html?type=物件" class="theme-btn">主題：物件</a>
        <a href="list.html?type=配件" class="theme-btn">主題：配件</a>
        <a href="list.html?type=技能" class="theme-btn">主題：技能</a>
        <a href="list.html?type=特質" class="theme-btn">主題：特質</a>
    </div>
</body>
</html>
