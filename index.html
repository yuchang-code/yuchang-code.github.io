<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展覽首頁</title>
    <style>
        :root { --maroon: #8b203c; --pink: #d68197; }
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; background-color: #f5f5f5; }
        header { 
            background: var(--maroon) url('./header.png') center/cover; 
            height: 200px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 40px; font-weight: bold; letter-spacing: 5px;
        }
        
        /* 載入遮罩 */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(139, 32, 60, 0.95); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; font-size: 24px; transition: opacity 0.5s;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3); width: 50px; height: 50px;
            border-radius: 50%; border-left-color: white;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; 
            padding: 50px; max-width: 1000px; margin: 20px auto;
        }
        .theme-btn {
            background-color: var(--pink); color: white; text-decoration: none;
            height: 150px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; border-radius: 25px; transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-weight: bold;
        }
        .theme-btn:hover { transform: scale(1.05); background-color: #c46d84; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">正在從雲端載入展館資料...</div>
    </div>

    <header>展 覽 標 題</header>
    <div class="container">
        <a href="list.html?type=物件" class="theme-btn">主題：物件</a>
        <a href="list.html?type=配件" class="theme-btn">主題：配件</a>
        <a href="list.html?type=技能" class="theme-btn">主題：技能</a>
        <a href="list.html?type=特質" class="theme-btn">主題：特質</a>
    </div>

    <script>
        const GAS_URL = "你的AppsScript網址"; 

        async function preloadData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                // 把大包資料轉成文字存在瀏覽器快取裡
                localStorage.setItem('exhibitionData', JSON.stringify(data));
                
                // 隱藏載入畫面
                const loader = document.getElementById('loader');
                loader.style.opacity = 0;
                setTimeout(() => loader.style.display = 'none', 500);
            } catch (e) {
                document.getElementById('loader-text').innerText = "載入失敗，請確認網路與雲端設定！";
                console.error(e);
            }
        }

        preloadData();
    </script>
</body>
</html>
