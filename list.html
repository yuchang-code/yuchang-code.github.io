<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獎牌列表</title>
    <style>
        :root { --maroon: #8b203c; --pink: #d68197; }
        body { margin: 0; background-color: #f9f9f9; font-family: sans-serif; }
        header { 
            background: var(--maroon); 
            color: white; 
            padding: 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; /* 讓內部的絕對定位按鈕可以對齊 */
            min-height: 40px;
        }
        .header-title {
            font-size: 32px; 
            font-weight: bold;
            margin: 0;
        }

        /* 回首頁按鈕樣式 */
        .home-btn {
            position: absolute;
            left: 20px;
            background-color: var(--pink);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .home-btn:hover {
            background-color: #c46d84;
            transform: translateY(-2px);
        }
        .grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
            padding: 40px; max-width: 1200px; margin: 0 auto;
        }
        .item-card {
            background-color: var(--pink); border-radius: 20px; padding: 15px;
            text-align: center; color: white; cursor: pointer; text-decoration: none;
            transition: 0.3s;
        }
        .item-card:hover { background-color: #c46d84; }
        .img-placeholder {
            background: #fff; width: 100%; aspect-ratio: 1/1; 
            border-radius: 15px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; color: var(--pink);
        }
        .img-placeholder img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="home-btn">🏠 回首頁</a>
        <div class="header-title" id="title">分類載入中...</div>
    </header>
    <div class="grid" id="list-container">
        </div>

    <script>
        // 取得網址參數
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || '物件';
        document.getElementById('title').innerText = type;

       async function fetchMedals() {
            const GAS_URL = "https://script.google.com/macros/s/AKfycbzFdiVTqT5QxCJPdCRLDHGn_tKrpIJ82LlmRKLYkrFRxCxSu1n9lnwXA_bOtTOYzRe7Fg/exec"; 
            const container = document.getElementById('list-container');
            container.innerHTML = "正在從雲端搬運獎牌...";
        
            try {
                const response = await fetch(`${GAS_URL}?action=getList&type=${type}`);
                const data = await response.json();
                
                container.innerHTML = ""; // 清空載入文字
                data.forEach(item => {
                    container.innerHTML += `
                        <a href="detail.html?name=${item.name}&img=${item.url}" class="item-card">
                            <div class="img-placeholder">
                                <img src="${item.url}" alt="${item.name}">
                            </div>
                            <div>${item.name}</div>
                        </a>
                    `;
                });
            } catch (e) {
                container.innerHTML = "載入失敗，請確認資料夾權限或網址是否正確。";
            }
        }
        fetchMedals();
    </script>
</body>
</html>
