            &lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; class=&quot;h-5 w-5&quot; fill=&quot;none&quot; viewBox=&quot;0 0 24 24&quot; stroke=&quot;currentColor&quot;&gt;
                &lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M13 10V3L4 14h7v7l9-11h-7z&quot; /&gt;
            &lt;/svg&gt;
            &lt;span&gt;生動優化&lt;/span&gt;
            &lt;div id=&quot;loadingSpinner_vivid&quot; class=&quot;loader hidden&quot;&gt;&lt;/div&gt;
        &lt;/button&gt;

        &lt;button id=&quot;grammarBtn&quot; onclick=&quot;performTranslation(&#39;grammar&#39;)&quot; class=&quot;w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded shadow-md transform active:scale-95 transition-all flex items-center justify-center gap-2&quot;&gt;
            &lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; class=&quot;h-5 w-5&quot; fill=&quot;none&quot; viewBox=&quot;0 0 24 24&quot; stroke=&quot;currentColor&quot;&gt;
                &lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z&quot; /&gt;
            &lt;/svg&gt;
            &lt;span&gt;文法檢查&lt;/span&gt;
            &lt;div id=&quot;loadingSpinner_grammar&quot; class=&quot;loader hidden&quot;&gt;&lt;/div&gt;
        &lt;/button&gt;
    &lt;/div&gt;

    &lt;!-- Toast Notification --&gt;
    &lt;div id=&quot;toast&quot; class=&quot;fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50&quot;&gt;
        Notification
    &lt;/div&gt;

    &lt;script&gt;
        const apiKey = &quot;&quot;; // System provides key at runtime
        let recognition = null;
        let isListening = false;

        // Initialize Speech Recognition
        if (&#39;webkitSpeechRecognition&#39; in window || &#39;SpeechRecognition&#39; in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false; // Stop after one sentence/pause
            recognition.interimResults = false;
            recognition.lang = &#39;zh-TW&#39;; // Default to Traditional Chinese, can be changed or auto-detected in advanced implementations

            recognition.onstart = function() {
                isListening = true;
                const micBtn = document.getElementById(&#39;micBtn&#39;);
                micBtn.classList.add(&#39;mic-listening&#39;);
                showToast(&#39;正在聆聽...&#39;, &#39;info&#39;);
            };

            recognition.onend = function() {
                isListening = false;
                const micBtn = document.getElementById(&#39;micBtn&#39;);
                micBtn.classList.remove(&#39;mic-listening&#39;);
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                const srcText = document.getElementById(&#39;srcText&#39;);
                
                // Append text if there&#39;s already content, otherwise set it
                if (srcText.value.trim().length &gt; 0) {
                    srcText.value += &quot; &quot; + transcript;
                } else {
                    srcText.value = transcript;
                }
                showToast(&#39;語音輸入完成&#39;);
            };

            recognition.onerror = function(event) {
                console.error(&quot;Speech recognition error&quot;, event.error);
                isListening = false;
                document.getElementById(&#39;micBtn&#39;).classList.remove(&#39;mic-listening&#39;);
                if (event.error === &#39;not-allowed&#39;) {
                    showToast(&#39;請允許麥克風權限&#39;, &#39;error&#39;);
                } else {
                    showToast(&#39;語音辨識失敗&#39;, &#39;error&#39;);
                }
            };
        } else {
            console.log(&quot;Web Speech API not supported&quot;);
            // Hide mic button if not supported
            document.addEventListener(&#39;DOMContentLoaded&#39;, () =&gt; {
                const micBtn = document.getElementById(&#39;micBtn&#39;);
                if (micBtn) micBtn.style.display = &#39;none&#39;;
            });
        }

        function toggleDictation() {
            if (!recognition) {
                showToast(&#39;您的瀏覽器不支援語音輸入&#39;, &#39;error&#39;);
                return;
            }

            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function showToast(message, type = &#39;info&#39;) {
            const toast = document.getElementById(&#39;toast&#39;);
            toast.textContent = message;
            toast.style.backgroundColor = type === &#39;error&#39; ? &#39;#ef4444&#39; : &#39;#1f2937&#39;;
            toast.classList.remove(&#39;opacity-0&#39;);
            setTimeout(() =&gt; {
                toast.classList.add(&#39;opacity-0&#39;);
            }, 3000);
        }

        function copyText(elementId) {
            const el = document.getElementById(elementId);
            el.select();
            document.execCommand(&#39;copy&#39;);
            showToast(&#39;已複製到剪貼簿&#39;);
            window.getSelection().removeAllRanges();
        }

        async function performTranslation(mode = &#39;standard&#39;) {
            const srcText = document.getElementById(&#39;srcText&#39;).value.trim();
            const langSelect = document.getElementById(&#39;langSelect&#39;);
            const targetLang = langSelect.options[langSelect.selectedIndex].value; 
            const destText = document.getElementById(&#39;destText&#39;);
            
            // Get buttons and spinners based on mode
            const standardBtn = document.getElementById(&#39;translateBtn&#39;);
            const optimizeBtn = document.getElementById(&#39;optimizeBtn&#39;);
            const grammarBtn = document.getElementById(&#39;grammarBtn&#39;);
            
            let activeBtn, activeSpinner;
            
            if (mode === &#39;standard&#39;) {
                activeBtn = standardBtn;
                activeSpinner = document.getElementById(&#39;loadingSpinner_standard&#39;);
            } else if (mode === &#39;vivid&#39;) {
                activeBtn = optimizeBtn;
                activeSpinner = document.getElementById(&#39;loadingSpinner_vivid&#39;);
            } else {
                activeBtn = grammarBtn;
                activeSpinner = document.getElementById(&#39;loadingSpinner_grammar&#39;);
            }

            const btnTextSpan = activeBtn.querySelector(&#39;span&#39;);
            const originalBtnText = btnTextSpan.textContent;

            if (!srcText) {
                showToast(&#39;請輸入內容&#39;, &#39;error&#39;);
                return;
            }

            // UI Loading State (Disable all buttons)
            [standardBtn, optimizeBtn, grammarBtn].forEach(btn =&gt; {
                btn.disabled = true;
                btn.classList.add(&#39;opacity-50&#39;, &#39;cursor-not-allowed&#39;);
            });
            
            activeSpinner.classList.remove(&#39;hidden&#39;);
            
            if (mode === &#39;grammar&#39;) {
                btnTextSpan.textContent = &#39;檢查中...&#39;;
            } else if (mode === &#39;vivid&#39;) {
                btnTextSpan.textContent = &#39;優化中...&#39;;
            } else {
                btnTextSpan.textContent = &#39;翻譯中...&#39;;
            }
            
            destText.value = &#39;&#39;;

            try {
                let prompt = &quot;&quot;;
                
                if (mode === &#39;standard&#39;) {
                    prompt = `Translate the following text to ${targetLang}. Detect the source language automatically. Only output the translated text without any explanations or additional formatting.\n\nText to translate:\n${srcText}`;
                } else if (mode === &#39;vivid&#39;) {
                    prompt = `Translate the following text to ${targetLang}. Detect the source language automatically. The translation MUST be vivid, lively, engaging, and creative (生動優化). Avoid stiff or robotic phrasing. Only output the translated result without any explanations.\n\nText to translate:\n${srcText}`;
                } else if (mode === &#39;grammar&#39;) {
                    prompt = `Please check the following text for grammar, spelling, and punctuation errors. 
                    1. Provide the corrected version of the text.
                    2. If there were errors, leave a blank line and then provide a brief bulleted list of the corrections made in Traditional Chinese (繁體中文).
                    3. If the text was perfect, just output the original text and add a note saying &quot;No errors found.&quot; in Traditional Chinese.
                    
                    Text to check:\n${srcText}`;
                }

                const result = await generateContentWithRetry(prompt);
                
                if (result) {
                    destText.value = result;
                } else {
                    throw new Error(&quot;No response content&quot;);
                }

            } catch (error) {
                console.error(&quot;Translation error:&quot;, error);
                destText.value = &quot;處理失敗，請稍後再試。\n\n&quot; + error.message;
                showToast(&#39;發生錯誤&#39;, &#39;error&#39;);
            } finally {
                // Reset UI State
                [standardBtn, optimizeBtn, grammarBtn].forEach(btn =&gt; {
                    btn.disabled = false;
                    btn.classList.remove(&#39;opacity-50&#39;, &#39;cursor-not-allowed&#39;);
                });
                
                activeSpinner.classList.add(&#39;hidden&#39;);
                btnTextSpan.textContent = originalBtnText;
            }
        }

        // Retry logic with exponential backoff
        async function generateContentWithRetry(prompt, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i &lt; retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: &#39;POST&#39;,
                        headers: {
                            &#39;Content-Type&#39;: &#39;application/json&#39;
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: prompt }]
                            }]
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || &quot;&quot;;

                } catch (error) {
                    if (i === retries - 1) throw error; // Throw on last attempt
                    await new Promise(resolve =&gt; setTimeout(resolve, delays[i]));
                }
            }
        }
