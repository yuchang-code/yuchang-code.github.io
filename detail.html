<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獎牌詳情</title>
    <style>
        :root { --maroon: #8b203c; --pink: #d68197; --light-pink: #fdf5f7; }
        body { 
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            font-family: sans-serif; background-color: #f5f5f5; padding: 20px; box-sizing: border-box;
        }
        .detail-container { 
            display: flex; width: 100%; max-width: 1100px; gap: 40px; background: white;
            padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); align-items: stretch; 
        }
        .main-image-box {
            flex: 1.2; background-color: var(--pink); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; min-height: 450px; padding: 20px; box-sizing: border-box; text-align: center;
        }
        .main-image-box img { max-width: 100%; max-height: 350px; border-radius: 15px; object-fit: contain; }
        .medal-title { font-size: 28px; font-weight: bold; margin-top: 20px; }
        .content-sidebar { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .info-card {
            background-color: var(--light-pink); border-left: 5px solid var(--maroon);
            padding: 20px; border-radius: 0 15px 15px 0; flex-grow: 1; display: flex; flex-direction: column; gap: 15px;
        }
        .info-section h3 { margin: 0 0 5px 0; color: var(--maroon); font-size: 18px; border-bottom: 1px dashed var(--pink); padding-bottom: 5px; }
        .info-section p { margin: 0; color: #444; font-size: 15px; line-height: 1.6; white-space: pre-line; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn {
            background-color: var(--maroon); color: white; border: none; padding: 15px; 
            border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center; text-decoration: none;
        }
        .action-btn:hover { background-color: #b03554; transform: translateY(-2px); }
        .action-btn.active { background-color: var(--pink); }
        .back-btn { background: #666; }
        @media (max-width: 768px) { .detail-container { flex-direction: column; } .main-image-box { min-height: 300px; } }
    </style>
</head>
<body>
    <div class="detail-container">
        <div class="main-image-box">
            <img id="medal-img" src="" alt="獎牌圖片">
            <div class="medal-title" id="medal-name">載入中...</div>
        </div>
        
        <div class="content-sidebar">
            <div class="info-card">
                <div class="info-section">
                    <h3>💡 作品理念</h3>
                    <p id="concept-text">載入中...</p>
                </div>
                <div class="info-section">
                    <h3>🎤 採訪內容</h3>
                    <p id="interview-text">載入中...</p>
                </div>
            </div>
            <div class="button-group">
                <button class="action-btn" id="draft-btn" onclick="toggleDraft()">切換草圖設計</button>
                <a href="javascript:history.back()" class="action-btn back-btn">回上一頁</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const medalName = urlParams.get('name');
        const defaultImg = urlParams.get('img');

        let detailText = { concept: "暫無作品理念。", interview: "暫無採訪內容。", draftUrl: "" };
        let showingDraft = false;

        document.getElementById('medal-name').innerText = medalName;
        document.getElementById('medal-img').src = defaultImg;

        function loadDetailFromCache() {
            const rawData = localStorage.getItem('exhibitionData');
            if (rawData) {
                const data = JSON.parse(rawData);
                // 直接比對名字，拿取試算表的內容
                if (data.texts && data.texts[medalName]) {
                    detailText = data.texts[medalName];
                }
            }
            document.getElementById('concept-text').innerText = detailText.concept;
            document.getElementById('interview-text').innerText = detailText.interview;
        }

        function toggleDraft() {
            const imgElement = document.getElementById('medal-img');
            const draftBtn = document.getElementById('draft-btn');

            if (!showingDraft) {
                if (detailText.draftUrl) {
                    imgElement.src = detailText.draftUrl;
                    draftBtn.innerText = "看成品設計";
                    draftBtn.classList.add('active');
                    showingDraft = true;
                } else {
                    alert("此獎牌尚未上傳草圖設計！");
                }
            } else {
                imgElement.src = defaultImg;
                draftBtn.innerText = "切換草圖設計";
                draftBtn.classList.remove('active');
                showingDraft = false;
            }
        }

        loadDetailFromCache();
    </script>
</body>
</html>
