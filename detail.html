<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獎牌詳情</title>
    <style>
        :root { --maroon: #8b203c; --pink: #d68197; }
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .detail-container {
            display: flex; width: 90%; max-width: 1100px; gap: 40px; align-items: stretch;
        }
        /* 左側大圖區 */
        .main-image {
            flex: 2; background-color: var(--pink); border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-size: 60px; min-height: 500px;
        }
        .main-image span { font-size: 24px; margin-top: 20px; }
        
        /* 右側按鈕區 */
        .action-sidebar {
            flex: 1; display: flex; flex-direction: column; gap: 20px;
        }
        .action-btn {
            background-color: var(--maroon); color: white; border: none;
            padding: 30px; border-radius: 20px; font-size: 24px;
            cursor: pointer; transition: 0.3s; text-align: center;
            text-decoration: none;
        }
        .action-btn:hover { opacity: 0.8; transform: translateX(10px); }
        .back-btn { margin-top: auto; background: #666; font-size: 16px; padding: 15px; }
    </style>
</head>
<body>
    <div class="detail-container">
        <div class="main-image">
            獎牌圖片
            <span>獎牌詳細說明文字...</span>
        </div>
        <div class="action-sidebar">
            <button class="action-btn" onclick="alert('顯示作品理念')">作品<br>理念</button>
            <button class="action-btn" onclick="alert('顯示採訪內容')">採訪<br>內容</button>
            <button class="action-btn" onclick="alert('顯示草圖設計')">草圖<br>設計</button>
            <a href="javascript:history.back()" class="action-btn back-btn">回上一頁</a>
        </div>
    </div>
</body>
</html>
